<style>
  html, body {
    margin: 0;
    padding: 0;
    height: auto;
    min-height: 0;
  }

  body {
    display: block;
  }

  #plugin-root {
    height: auto;
  }

  fig-group {
    margin-bottom: 0;
    padding-bottom: var(--spacer-2);
  }

  fig-group + fig-group {
    box-shadow: inset 0 1px 0 0 var(--figma-color-border);
    padding-top: var(--spacer-2);
  }

  body > fig-group:first-of-type,
  #plugin-root > fig-group:first-of-type {
    padding-top: 12px;
  }

  fig-group > fig-header {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    height: auto;
    min-height: 0;
    padding: var(--spacer-1) var(--spacer-3) 0;
    margin: 0;
  }

  fig-group + fig-group > fig-header {
    padding-top: var(--spacer-1);
  }

  fig-group > fig-header h3 {
    font-weight: var(--body-medium-fontWeight);
    line-height: var(--body-medium-lineHeight);
    margin: 0;
    padding-bottom: var(--spacer-1);
  }

  fig-footer,
  fig-footer[borderless] {
    box-shadow: inset 0 1px 0 var(--figma-color-border);
    flex-direction: column;
    align-items: stretch;
    height: auto;
    min-height: 0;
    padding: 12px 16px;
  }

  fig-footer::before {
    display: none;
  }

  .footer-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .footer-actions fig-button {
    width: 100%;
    margin: 0;
  }

  .csv-field {
    padding: 0 var(--spacer-3) var(--spacer-1);
  }

  .csv-field fig-input-text {
    width: 100%;
  }

  .csv-field fig-input-text textarea {
    min-height: 96px;
    resize: vertical;
    font-family: var(--font-family);
    font-size: var(--body-small-fontSize);
    line-height: 1.35;
  }

  dialog.fig-fill-picker-dialog {
    width: 240px;
    max-width: 240px;
    min-width: 240px;
    max-height: none;
    height: max-content;
    overflow: visible;
  }

  dialog.fig-fill-picker-dialog .fig-fill-picker-sliders fig-slider {
    width: 100%;
    display: flex;
  }

  dialog.fig-fill-picker-dialog .fig-fill-picker-sliders fig-slider .fig-slider-input-container {
    flex: 1 1 auto;
    min-width: 0;
  }

  dialog.fig-fill-picker-dialog fig-field.fig-fill-picker-inputs[direction="horizontal"] {
    --fig-field-left-padding: 0;
    --fig-field-label-ratio: calc(3.5rem + var(--spacer-3));
    --fig-field-input-ratio: 1fr;
  }

  dialog.fig-fill-picker-dialog fig-field.fig-fill-picker-inputs > .fig-fill-picker-input-mode {
    width: 3.5rem;
    max-width: 100%;
    justify-self: center;
  }

  dialog.fig-fill-picker-dialog fig-field.fig-fill-picker-inputs > .fig-fill-picker-input-fields {
    min-width: 0;
  }

  .collapsible {
    display: grid;
    grid-template-rows: 1fr;
    transition: grid-template-rows 200ms ease, opacity 160ms ease;
    opacity: 1;
  }
  .collapsible > .collapsible-inner {
    overflow: hidden;
    min-height: 0;
  }
  .collapsible[collapsed] {
    grid-template-rows: 0fr;
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="plugin-root">

  <fig-group>
    <fig-header borderless><h3>Data</h3></fig-header>
    <div class="csv-field">
      <fig-input-text id="csvData" multiline="true" placeholder="artist,stage,time,day,section,image_url"></fig-input-text>
    </div>
    <fig-field direction="horizontal" columns="thirds">
      <label for="autoFindImages">Auto-find images</label>
      <fig-switch id="autoFindImages"></fig-switch>
    </fig-field>
  </fig-group>

  <fig-group>
    <fig-header borderless><h3>Grid</h3></fig-header>
    <fig-field direction="horizontal" columns="thirds">
      <label for="columns">Columns</label>
      <fig-input-number id="columns" value="3" min="1" max="5" steppers="true"></fig-input-number>
    </fig-field>
    <fig-field direction="horizontal" columns="thirds">
      <label for="gap">Gap</label>
      <fig-slider id="gap" variant="neue" value="16" min="8" max="40" text="true" units="px" full></fig-slider>
    </fig-field>

        <option value="compact">Compact</option>
      </fig-dropdown>
    </fig-field>

<script>
  var lastReportedHeight = 0;
  var resizeRaf = 0;
  var outputSelected = false;

  var SAMPLE_CSV = 'artist,stage,time,day,section,image_url\n' +
    'Tame Impala,Main Stage,10:00 PM,Friday,Headliners,\n' +
    'Kaytranada,Redwood Stage,9:00 PM,Friday,Headliners,\n' +
    'Bonobo,Creek Stage,11:00 PM,Friday,Headliners,\n' +
    'Moodymann,The Grove,4:00 PM,Saturday,Redwood Stage,';

  function reportHeight(height) {
    var h = Math.ceil(height);
    if (h && h !== lastReportedHeight) {
      lastReportedHeight = h;
      parent.postMessage({ pluginMessage: { type: 'resize', height: h } }, '*');
    }
  }

  function measurePanelHeight() {
    var root = document.getElementById('plugin-root');
    if (!root) return 0;
    var height = Math.ceil(root.getBoundingClientRect().height);
    var dialog = document.querySelector('dialog.fig-fill-picker-dialog[open]');
    if (dialog) {
      var dialogBottom = Math.ceil(dialog.getBoundingClientRect().bottom + 12);
      height = Math.max(height, dialogBottom);
    }
    return height;
  }

  function reportPanelHeight() {
    reportHeight(measurePanelHeight());
  }

  (function setupAutoResize() {
    var root = document.getElementById('plugin-root');
    if (!root || typeof ResizeObserver === 'undefined') return;
    var observer = new ResizeObserver(function () {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(function () {
        resizeRaf = 0;
        reportPanelHeight();
      });
    });
    observer.observe(root);
  })();

  (function watchColorPickerDialog() {
    if (typeof MutationObserver === 'undefined') return;
    var observer = new MutationObserver(function () {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(function () {
        resizeRaf = 0;
        reportPanelHeight();
      });
    });
    observer.observe(document.body, {
      subtree: true,
      childList: true,
      attributes: true,
      attributeFilter: ['open'],
    });
  })();

  function readValue(el) {
    if (!el) return '';
    if (el.tagName === 'FIG-SWITCH') return !!el.checked;
    if (el.tagName === 'FIG-SLIDER' || el.tagName === 'FIG-INPUT-NUMBER') return Number(el.value);
    return el.value ?? '';
  }

  function writeValue(el, value) {
    if (!el) return;
    if (el.tagName === 'FIG-SWITCH') {
      el.checked = !!value;
      return;
    }
    el.value = value == null ? '' : String(value);
  }

  function getStateFromForm() {
    return {
      csvData: String(readValue(document.getElementById('csvData')) || SAMPLE_CSV),
      columns: Number(readValue(document.getElementById('columns')) || 3),
      gap: Number(readValue(document.getElementById('gap')) || 16),
      cardSize: String(readValue(document.getElementById('cardSize')) || 'headliner'),
      groupBy: String(readValue(document.getElementById('groupBy')) || 'section'),
      autoFindImages: !!readValue(document.getElementById('autoFindImages')),
      imageTreatment: String(readValue(document.getElementById('imageTreatment')) || 'noir'),
      cropBias: String(readValue(document.getElementById('cropBias')) || 'center'),
      grain: Number(readValue(document.getElementById('grain')) || 35),
      contrast: Number(readValue(document.getElementById('contrast')) || 80),
      showSectionLabels: !!readValue(document.getElementById('showSectionLabels')),
    };
  }

  function setStateInForm(state) {
    writeValue(document.getElementById('csvData'), state.csvData || SAMPLE_CSV);
    writeValue(document.getElementById('columns'), state.columns);
    writeValue(document.getElementById('gap'), state.gap);
    writeValue(document.getElementById('cardSize'), state.cardSize);
    writeValue(document.getElementById('groupBy'), state.groupBy);
    writeValue(document.getElementById('autoFindImages'), state.autoFindImages);
    writeValue(document.getElementById('imageTreatment'), state.imageTreatment);
    writeValue(document.getElementById('cropBias'), state.cropBias);
    writeValue(document.getElementById('grain'), state.grain);
    writeValue(document.getElementById('contrast'), state.contrast);
    writeValue(document.getElementById('showSectionLabels'), state.showSectionLabels);
    reportPanelHeight();
  }

  function fireRegenerate() {
    if (!outputSelected) return;
    parent.postMessage({ pluginMessage: { type: 'regenerate', state: getStateFromForm() } }, '*');
  }

  function bindCommitFire(el) {
    if (!el) return;
    el.addEventListener('change', fireRegenerate);
  }

  Promise.all([
    customElements.whenDefined('fig-group'),
    customElements.whenDefined('fig-field'),
    customElements.whenDefined('fig-input-text'),
    customElements.whenDefined('fig-input-number'),
    customElements.whenDefined('fig-dropdown'),
    customElements.whenDefined('fig-slider'),
    customElements.whenDefined('fig-switch'),
    customElements.whenDefined('fig-button'),
    customElements.whenDefined('fig-footer'),
  ]).then(function () {
    writeValue(document.getElementById('csvData'), SAMPLE_CSV);

    bindCommitFire(document.getElementById('csvData'));
    bindCommitFire(document.getElementById('columns'));
    bindCommitFire(document.getElementById('gap'));
    bindCommitFire(document.getElementById('cardSize'));
    bindCommitFire(document.getElementById('groupBy'));
    bindCommitFire(document.getElementById('autoFindImages'));
    bindCommitFire(document.getElementById('showSectionLabels'));
    bindCommitFire(document.getElementById('imageTreatment'));
    bindCommitFire(document.getElementById('cropBias'));
    bindCommitFire(document.getElementById('grain'));
    bindCommitFire(document.getElementById('contrast'));

    document.getElementById('run').addEventListener('click', function () {
      parent.postMessage({ pluginMessage: { type: 'generate', state: getStateFromForm() } }, '*');
    });

    reportPanelHeight();
  });

  window.onmessage = function (event) {
    var msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'loadState') {
      setStateInForm(msg.state);
    }

    if (msg.type === 'outputSelected') {
      outputSelected = !!msg.selected;
    }
  };
</script>

</body>
</html>
