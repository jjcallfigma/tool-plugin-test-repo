<style>
  html, body {
    margin: 0;
    padding: 0;
    height: auto;
    min-height: 0;
  }

  body {
    display: block;
  }

  #plugin-root {
    height: auto;
  }

  fig-group {
    margin-bottom: 0;
    padding-bottom: var(--spacer-2);
  }

  fig-group + fig-group {
    box-shadow: inset 0 1px 0 0 var(--figma-color-border);
    padding-top: var(--spacer-2);
  }

  #plugin-root > fig-group:first-of-type {
    padding-top: 12px;
  }

  fig-group > fig-header {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    height: auto;
    min-height: 0;
    padding: var(--spacer-1) var(--spacer-3) 0;
    margin: 0;
  }

  fig-group + fig-group > fig-header {
    padding-top: var(--spacer-1);
  }

  fig-group > fig-header h3 {
    font-weight: var(--body-medium-fontWeight);
    line-height: var(--body-medium-lineHeight);
    margin: 0;
    padding-bottom: var(--spacer-1);
  }

  fig-footer,
  fig-footer[borderless] {
    box-shadow: inset 0 1px 0 var(--figma-color-border);
    flex-direction: column;
    align-items: stretch;
    height: auto;
    min-height: 0;
    padding: 12px 16px;
  }

  fig-footer::before { display: none; }

  .footer-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .footer-actions fig-button {
    width: 100%;
    margin: 0;
  }

  dialog.fig-fill-picker-dialog {
    width: 240px;
    max-width: 240px;
    min-width: 240px;
    max-height: none;
    height: max-content;
    overflow: visible;
  }

  dialog.fig-fill-picker-dialog .fig-fill-picker-sliders fig-slider {
    width: 100%;
    display: flex;
  }

  dialog.fig-fill-picker-dialog .fig-fill-picker-sliders fig-slider .fig-slider-input-container {
    flex: 1 1 auto;
    min-width: 0;
  }

  dialog.fig-fill-picker-dialog fig-field.fig-fill-picker-inputs[direction="horizontal"] {
    --fig-field-left-padding: 0;
    --fig-field-label-ratio: calc(3.5rem + var(--spacer-3));
    --fig-field-input-ratio: 1fr;
  }

  dialog.fig-fill-picker-dialog fig-field.fig-fill-picker-inputs > .fig-fill-picker-input-mode {
    width: 3.5rem;
    max-width: 100%;
    justify-self: center;
  }

  dialog.fig-fill-picker-dialog fig-field.fig-fill-picker-inputs > .fig-fill-picker-input-fields {
    min-width: 0;
  }

  /* People textarea */
  .people-wrap {
    padding: 0 var(--spacer-3) var(--spacer-2);
  }

  .people-hint {
    font-size: 10px;
    color: var(--figma-color-text-secondary, #888);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  #peopleText {
    width: 100%;
    box-sizing: border-box;
    background: var(--figma-color-bg-secondary, #f5f5f5);
    border: 1px solid var(--figma-color-border, #e0e0e0);
    border-radius: 4px;
    color: var(--figma-color-text, #1e1e1e);
    font-family: 'Inter', monospace;
    font-size: 10px;
    line-height: 1.5;
    padding: 6px 8px;
    resize: vertical;
    min-height: 110px;
    outline: none;
  }

  #peopleText:focus {
    border-color: var(--figma-color-border-brand-strong, #0d99ff);
  }

  /* Highlight text input */
  .highlight-wrap {
    padding: 0 var(--spacer-3) var(--spacer-2);
  }

  #highlightInput {
    width: 100%;
    box-sizing: border-box;
    background: var(--figma-color-bg-secondary, #f5f5f5);
    border: 1px solid var(--figma-color-border, #e0e0e0);
    border-radius: 4px;
    color: var(--figma-color-text, #1e1e1e);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    padding: 5px 8px;
    outline: none;
  }

  #highlightInput:focus {
    border-color: var(--figma-color-border-brand-strong, #0d99ff);
  }

  #highlightInput::placeholder {
    color: var(--figma-color-text-disabled, #aaa);
  }
</style>
</head>
<body>

<div id="plugin-root">

  <!-- People list ─────────────────────────────────────────────────── -->
  <fig-group>
    <fig-header borderless><h3>People</h3></fig-header>
    <div class="people-wrap">
      <p class="people-hint">One person per line:<br>Name | Title | Team | Location | Manager Name</p>
      <textarea id="peopleText" spellcheck="false" autocomplete="off" autocorrect="off">Alex Rivera | Chief Executive Officer | Leadership | HQ |
Jordan Kim | VP Engineering | Engineering | HQ | Alex Rivera
Morgan Lee | VP Design | Design | HQ | Alex Rivera
Casey Chen | VP Marketing | Marketing | NYC | Alex Rivera
Riley Park | Senior Engineer | Engineering | HQ | Jordan Kim
Drew Singh | Staff Engineer | Engineering | London | Jordan Kim
Quinn Adams | Lead Designer | Design | HQ | Morgan Lee
Avery Brooks | Product Designer | Design | NYC | Morgan Lee
Taylor Gomez | Growth Manager | Marketing | NYC | Casey Chen
Sage Wilson | Brand Strategist | Marketing | London | Casey Chen</textarea>
    </div>
  </fig-group>

  <!-- Structure ────────────────────────────────────────────────────── -->
  <fig-group>
    <fig-header borderless><h3>Structure</h3></fig-header>

    <fig-field direction="horizontal" columns="thirds">
      <label for="layout">Layout</label>
      <fig-dropdown id="layout" value="top-down">
        <option value="top-down">Top-down</option>
        <option value="left-right">Left-to-right</option>
        <option value="radial">Radial</option>
      </fig-dropdown>
    </fig-field>

    <fig-field direction="horizontal" columns="thirds">
      <label for="depth">Depth</label>
      <fig-input-number id="depth" value="3" min="1" max="5" steppers="true"></fig-input-number>
    </fig-field>

  </fig-group>

  <!-- Cards ────────────────────────────────────────────────────────── -->
  <fig-group>
    <fig-header borderless><h3>Cards</h3></fig-header>

    <fig-field direction="horizontal" columns="thirds">
      <label for="cardStyle">Style</label>
      <fig-dropdown id="cardStyle" value="full">
        <option value="full">Full</option>
        <option value="compact">Compact</option>
        <option value="minimal">Minimal</option>
      </fig-dropdown>
    </fig-field>

    <fig-field direction="horizontal" columns="thirds">
      <label for="colorRule">Color by</label>
      <fig-dropdown id="colorRule" value="team">
        <option value="team">Team</option>
        <option value="level">Level</option>
        <option value="geography">Location</option>
      </fig-dropdown>
    </fig-field>

  </fig-group>

  <!-- Connectors ───────────────────────────────────────────────────── -->
  <fig-group>
    <fig-header borderless><h3>Connectors</h3></fig-header>

    <fig-field direction="horizontal" columns="thirds">
      <label for="connectorStyle">Style</label>
      <fig-dropdown id="connectorStyle" value="right-angle">
        <option value="right-angle">Right-angle</option>
        <option value="curved">Curved</option>
        <option value="straight">Straight</option>
      </fig-dropdown>
    </fig-field>

  </fig-group>

  <!-- Highlight ────────────────────────────────────────────────────── -->
  <fig-group>
    <fig-header borderless><h3>Highlight</h3></fig-header>
    <div class="highlight-wrap">
      <input id="highlightInput" type="text" placeholder="Name to highlight…" autocomplete="off" />
    </div>
  </fig-group>

  <fig-footer borderless>
    <div class="footer-actions">
      <fig-button id="run" variant="primary">Generate</fig-button>
    </div>
  </fig-footer>

</div>

<script>
  var lastReportedHeight = 0;
  var resizeRaf = 0;

  function reportHeight(h) {
    h = Math.ceil(h);
    if (h && h !== lastReportedHeight) {
      lastReportedHeight = h;
      parent.postMessage({ pluginMessage: { type: 'resize', height: h } }, '*');
    }
  }

  function measurePanelHeight() {
    var root = document.getElementById('plugin-root');
    if (!root) return 0;
    var h = Math.ceil(root.getBoundingClientRect().height);
    var dialog = document.querySelector('dialog.fig-fill-picker-dialog[open]');
    if (dialog) h = Math.max(h, Math.ceil(dialog.getBoundingClientRect().bottom + 12));
    return h;
  }

  (function setupAutoResize() {
    var root = document.getElementById('plugin-root');
    if (!root || typeof ResizeObserver === 'undefined') return;
    new ResizeObserver(function () {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(function () { resizeRaf = 0; reportHeight(measurePanelHeight()); });
    }).observe(root);
  })();

  (function watchColorPickerDialog() {
    if (typeof MutationObserver === 'undefined') return;
    new MutationObserver(function () {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(function () { resizeRaf = 0; reportHeight(measurePanelHeight()); });
    }).observe(document.body, { subtree: true, childList: true, attributes: true, attributeFilter: ['open'] });
  })();

  // ─── App ──────────────────────────────────────────────────────────────────────

  var hasGenerated = false;
  var outputSelected = false;

  function readValue(el) {
    if (!el) return '';
    if (typeof el.value !== 'undefined' && el.value !== null && el.value !== '') return String(el.value);
    return el.getAttribute('value') || '';
  }

  function writeValue(el, val) {
    if (!el) return;
    el.setAttribute('value', String(val));
    if ('value' in el) el.value = String(val);
  }

  function getStateFromForm() {
    var ta = document.getElementById('peopleText');
    var hi = document.getElementById('highlightInput');
    return {
      layout:         readValue(document.getElementById('layout'))         || 'top-down',
      depth:          parseInt(readValue(document.getElementById('depth')), 10) || 3,
      cardStyle:      readValue(document.getElementById('cardStyle'))      || 'full',
      connectorStyle: readValue(document.getElementById('connectorStyle')) || 'right-angle',
      highlight:      (hi ? hi.value : '') || '',
      colorRule:      readValue(document.getElementById('colorRule'))      || 'team',
      peopleText:     ta ? ta.value : '',
    };
  }

  function setStateInForm(state) {
    if (state.layout)         writeValue(document.getElementById('layout'), state.layout);
    if (state.depth)          writeValue(document.getElementById('depth'), state.depth);
    if (state.cardStyle)      writeValue(document.getElementById('cardStyle'), state.cardStyle);
    if (state.connectorStyle) writeValue(document.getElementById('connectorStyle'), state.connectorStyle);
    if (state.colorRule)      writeValue(document.getElementById('colorRule'), state.colorRule);

    var hi = document.getElementById('highlightInput');
    if (hi && typeof state.highlight !== 'undefined') hi.value = state.highlight;

    var ta = document.getElementById('peopleText');
    if (ta && state.peopleText) ta.value = state.peopleText;
  }

  function fireRegenerate() {
    if (!hasGenerated || !outputSelected) return;
    parent.postMessage({ pluginMessage: { type: 'regenerate', state: getStateFromForm() } }, '*');
  }

  Promise.all([
    customElements.whenDefined('fig-group'),
    customElements.whenDefined('fig-header'),
    customElements.whenDefined('fig-footer'),
    customElements.whenDefined('fig-field'),
    customElements.whenDefined('fig-input-number'),
    customElements.whenDefined('fig-dropdown'),
    customElements.whenDefined('fig-button'),
  ]).then(function () {

    document.getElementById('run').addEventListener('click', function () {
      hasGenerated = true;
      parent.postMessage({ pluginMessage: { type: 'generate', state: getStateFromForm() } }, '*');
    });

    // FigUI3 dropdowns and number inputs → commit-fire
    document.querySelectorAll('fig-dropdown, fig-input-number').forEach(function (el) {
      el.addEventListener('change', fireRegenerate);
    });

    // Native textarea: fire on blur (commit-fire, not live)
    var ta = document.getElementById('peopleText');
    if (ta) ta.addEventListener('blur', fireRegenerate);

    // Native text input for highlight: fire on blur
    var hi = document.getElementById('highlightInput');
    if (hi) hi.addEventListener('blur', fireRegenerate);

  });

  window.onmessage = function (event) {
    var msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'loadState') { setStateInForm(msg.state); hasGenerated = true; }
    if (msg.type === 'outputSelected') { outputSelected = !!msg.selected; }
  };
</script>
